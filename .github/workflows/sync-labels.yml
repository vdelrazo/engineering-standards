# Reusable workflow — Sync Labels
# Sincroniza los labels definidos en ffss-engineering-standards hacia el repo que lo llama.
# Los labels que no están en labels.json NO se eliminan (modo aditivo).
#
# Llamarlo desde cada repo con:
#
#   on:
#     workflow_dispatch:
#
#   jobs:
#     sync:
#       uses: tiendas-3b/ffss-engineering-standards/.github/workflows/sync-labels.yml@main
#       secrets:
#         PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
#
# Cuándo correrlo:
#   - Una vez al integrar un repo nuevo al equipo
#   - Manualmente (workflow_dispatch) si se agregan labels nuevos en labels.json

name: Sync Labels (reusable)

on:
  workflow_call:
    secrets:
      PROJECT_TOKEN:
        required: true

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ffss-engineering-standards
        uses: actions/checkout@v4
        with:
          repository: tiendas-3b/ffss-engineering-standards
          token: ${{ secrets.PROJECT_TOKEN }}
          path: standards

      - name: Sync labels to calling repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const fs = require('fs');
            const labels = JSON.parse(
              fs.readFileSync('./standards/.github/labels/labels.json', 'utf8')
            );

            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // Obtener labels existentes en el repo destino
            const existing = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner, repo, per_page: 100
            });
            const existingMap = Object.fromEntries(existing.map(l => [l.name, l]));

            let created = 0;
            let updated = 0;
            let skipped = 0;

            for (const label of labels) {
              if (existingMap[label.name]) {
                const current = existingMap[label.name];
                // Actualizar solo si cambió color o descripción
                if (current.color !== label.color || current.description !== label.description) {
                  await github.rest.issues.updateLabel({
                    owner, repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                  console.log(`Updated: ${label.name}`);
                  updated++;
                } else {
                  skipped++;
                }
              } else {
                await github.rest.issues.createLabel({
                  owner, repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
                console.log(`Created: ${label.name}`);
                created++;
              }
            }

            console.log(`\nDone — created: ${created}, updated: ${updated}, skipped (no changes): ${skipped}`);
